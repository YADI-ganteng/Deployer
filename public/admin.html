<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YaddStore - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0a0a12; color:#eee; padding:10px; min-height:100vh; font-size:16px; }
        .container { max-width:100%; margin:0 auto; }
        .login-wrap { display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .login-box { background:rgba(255,255,255,0.05); padding:30px 20px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); width:100%; max-width:360px; text-align:center; }
        .login-box h2 { margin-bottom:20px; font-size:1.5em; }
        .login-box input { width:100%; padding:14px; margin:8px 0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-size:1em; }
        .login-box button { width:100%; padding:14px; background:linear-gradient(45deg,#ff6b6b,#ee5a24); border:none; border-radius:10px; color:#fff; font-weight:bold; cursor:pointer; font-size:1em; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:15px; flex-wrap:wrap; gap:8px; }
        .header h1 { font-size:1.4em; }
        .logout { background:#ff6b6b; border:none; padding:8px 15px; border-radius:8px; color:#fff; cursor:pointer; font-size:0.9em; }
        .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:15px; }
        .tabs button { padding:8px 12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#aaa; cursor:pointer; transition:0.3s; font-size:0.85em; white-space:nowrap; }
        .tabs button.active { background:#ff6b6b; color:#fff; border-color:#ff6b6b; }
        .panel { display:none; background:rgba(255,255,255,0.03); padding:15px; border-radius:16px; border:1px solid rgba(255,255,255,0.05); }
        .panel.active { display:block; }
        .btn-sm { padding:6px 12px; border:none; border-radius:6px; cursor:pointer; margin:3px 2px; font-size:0.85em; display:inline-block; }
        .btn-sm.danger { background:#ff6b6b; color:#fff; }
        .btn-sm.success { background:#2ed573; color:#000; }
        .btn-sm.primary { background:#4a9eff; color:#fff; }
        .form-group { margin:12px 0; }
        .form-group label { display:block; font-size:0.9em; color:#ccc; margin-bottom:5px; }
        .form-group input,.form-group select { width:100%; padding:12px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; font-size:1em; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        @media(max-width:500px){ .form-row { grid-template-columns:1fr; } }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2ed573; padding:12px 24px; border-radius:10px; display:none; z-index:999; font-weight:600; max-width:90vw; text-align:center; }
        .toast.err { background:#ff6b6b; }
        .debug-log { position:fixed; bottom:70px; left:10px; right:10px; background:rgba(0,0,0,0.9); color:#0f0; padding:8px; border-radius:8px; font-size:0.7em; max-height:120px; overflow-y:auto; display:none; z-index:1000; }
        .copy-log-btn { position:absolute; top:4px; right:8px; background:rgba(255,255,255,0.2); border:none; color:#fff; padding:4px 10px; border-radius:6px; font-size:0.75em; cursor:pointer; z-index:10; }
        .alert-popup { position:fixed; top:20px; left:10px; right:10px; background:#ff6b6b; color:#fff; padding:12px; border-radius:12px; z-index:2000; display:none; text-align:center; font-weight:bold; }
        .section-title { font-size:1.1em; color:#ffd93d; margin:20px 0 10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; }
        .cover-preview img { width:70px; height:70px; object-fit:cover; margin:4px; cursor:pointer; border-radius:8px; }
        .cover-preview img:hover { transform:scale(1.05); }
        .selected-cover { border:3px solid #ff6b6b !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="loginWrap" class="login-wrap">
        <div class="login-box">
            <h2>🔐 Admin Panel</h2>
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="adminLogin()">MASUK</button>
            <div style="margin-top:10px;font-size:0.8em;color:#666;">Default: admin123</div>
        </div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="container">
            <div class="header"><h1>🛠️ Admin Panel</h1><button class="logout" onclick="adminLogout()">🚪 Logout</button></div>
            <div class="tabs" id="tabButtons">
                <button class="active" data-tab="categories">📦</button>
                <button data-tab="payments">💳</button>
                <button data-tab="coupons">🏷️</button>
                <button data-tab="banners">🖼️</button>
                <button data-tab="settings">⚙️</button>
            </div>

            <!-- Categories Panel -->
            <div class="panel active" id="panel-categories">
                <div class="section-title">🎮 Game & Voucher</div>
                <div class="form-group"><label>Key (unik)</label><input id="catKey" placeholder="mlbb"></div>
                <div class="form-group"><label>Nama</label><input id="catName" placeholder="Mobile Legends"></div>
                <div class="form-row">
                    <div class="form-group"><label>Tipe</label><select id="catType" onchange="toggleCatInputs()">
                        <option value="game">Game</option>
                        <option value="voucher">Voucher</option>
                    </select></div>
                    <div class="form-group"><label>Unit</label><input id="catUnit" placeholder="Diamond"></div>
                </div>
                <div class="form-group"><label>Icon (emoji)</label><input id="catIcon" placeholder="⚔️"></div>
                <div class="form-group" id="serverOptionsGroup">
                    <label>Server (koma)</label><input id="catServers" placeholder="ID,Indonesia">
                </div>
                <div class="form-group">
                    <label>Cover (boleh kosong)</label>
                    <input type="text" id="coverUrl" placeholder="https://...">
                    <button type="button" class="btn-sm primary" onclick="searchCover()" style="margin-top:5px;">🔍 Cari Cover</button>
                    <div id="coverPreview" class="cover-preview" style="margin-top:8px;"></div>
                </div>
                <button id="btnAddCategory" class="btn-sm success" style="width:100%;padding:12px;font-size:1em;">➕ Tambah Game/Voucher</button>
                <hr style="margin:20px 0;border-color:rgba(255,255,255,0.1);">
                <div id="gameVoucherList"></div>

                <div class="section-title">🕹️ Mini Game</div>
                <div class="form-group"><label>Key (unik)</label><input id="miniKey" placeholder="snake"></div>
                <div class="form-group"><label>Nama Game</label><input id="miniName" placeholder="Snake Game"></div>
                <div class="form-group"><label>Icon (emoji)</label><input id="miniIcon" placeholder="🐍"></div>
                <div class="form-group"><label>Upload File HTML</label><input type="file" id="miniFile" accept=".html"></div>
                <div class="form-group">
                    <label>Cover (boleh kosong)</label>
                    <input type="text" id="miniCoverUrl" placeholder="https://...">
                    <button type="button" class="btn-sm primary" onclick="searchMiniCover()" style="margin-top:5px;">🔍 Cari Cover</button>
                    <div id="miniCoverPreview" class="cover-preview" style="margin-top:8px;"></div>
                </div>
                <button id="btnAddMiniGame" class="btn-sm success" style="width:100%;padding:12px;font-size:1em;">➕ Tambah Mini Game</button>
                <hr style="margin:20px 0;border-color:rgba(255,255,255,0.1);">
                <div id="miniGameList"></div>
            </div>

            <!-- Panel lainnya disederhanakan, tapi fungsi tetap sama -->
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="debug-log" id="debugLog" style="position:relative;">
    <button class="copy-log-btn" onclick="copyLog()">📋 Salin</button>
</div>
<div class="alert-popup" id="alertPopup"></div>

<script>
    // ========== GLOBAL ERROR HANDLER ==========
    window.onerror = function(message, source, lineno, colno, error) {
        const msg = `ERROR: ${message} (line ${lineno})`;
        addDebugLog(msg, true);
        showAlert('JS Error: ' + message);
        return true;
    };

    // ========== LOGGING ==========
    function addDebugLog(msg, isError = false) {
        const logDiv = document.getElementById('debugLog');
        if (!logDiv) return;
        logDiv.style.display = 'block';
        const line = document.createElement('div');
        line.textContent = '• ' + msg;
        line.style.color = isError ? '#ff6b6b' : '#0f0';
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    function copyLog() {
        const logDiv = document.getElementById('debugLog');
        const lines = [];
        logDiv.childNodes.forEach(node => {
            if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'DIV' && !node.classList.contains('copy-log-btn')) {
                lines.push(node.textContent);
            }
        });
        const text = lines.join('\n');
        if (!text) return toast('Log kosong','err');
        navigator.clipboard.writeText(text).then(()=>toast('✅ Log disalin')).catch(()=>{
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            toast('✅ Log disalin (fallback)');
        });
    }
    function showAlert(msg) {
        const el = document.getElementById('alertPopup');
        if (!el) return;
        el.textContent = msg;
        el.style.display = 'block';
        clearTimeout(el._t);
        el._t = setTimeout(() => el.style.display = 'none', 4000);
    }

    // ========== FIREBASE ==========
    addDebugLog('Inisialisasi Firebase...');
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBMwguFp5Az8Q4KPVkq6etrhrEY_fHrlgo",
            authDomain: "yaddstore.firebaseapp.com",
            projectId: "yaddstore",
            storageBucket: "yaddstore.firebasestorage.app",
            messagingSenderId: "1086200506513",
            appId: "1:1086200506513:web:9ee304eb4d8fe78d88f730"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        addDebugLog('Firebase siap.');
    } catch(e) {
        addDebugLog('Firebase init error: ' + e.message, true);
        showAlert('Firebase gagal: ' + e.message);
    }

    function toast(msg, type) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.className = 'toast' + (type === 'err' ? ' err' : '');
        t.style.display = 'block';
        clearTimeout(t._t);
        t._t = setTimeout(() => t.style.display = 'none', 3000);
        addDebugLog(`Toast: ${msg}`);
    }

    let configData = {
        categories: {
            hok: { name:"Honor of Kings", type:"game", icon:"👑", unit:"Token", serverOptions:[{value:"Asia",text:"Asia"}], packages:[], gameUrl:"", coverUrl:"" },
            kuota: { name:"Kuota Internet", type:"voucher", icon:"📱", unit:"GB", serverOptions:[], packages:[], gameUrl:"", coverUrl:"" }
        },
        payments: [{method:"Dana",number:"083170617054",icon:"💙"}],
        coupons: {},
        banners: [],
        adminPass: "admin123",
        background: {}
    };

    async function loadConfig() {
        try {
            const doc = await db.collection('config').doc('settings').get();
            if (doc.exists) configData = doc.data();
            else await db.collection('config').doc('settings').set(configData);
            addDebugLog('Konfigurasi dimuat.');
        } catch(e) { showAlert('Gagal load config: '+e.message); }
    }
    async function saveConfig() {
        try {
            await db.collection('config').doc('settings').set(configData, {merge:true});
            addDebugLog('Konfigurasi disimpan.');
        } catch(e) { showAlert('Gagal simpan: '+e.message); }
    }

    // ========== LOGIN ==========
    async function adminLogin() {
        await loadConfig();
        if (document.getElementById('adminPass').value === configData.adminPass) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            loadAll();
        } else {
            toast('Password salah','err');
            showAlert('Password salah!');
        }
    }
    function adminLogout() { location.reload(); }

    function loadAll() {
        renderGameVoucherList();
        renderMiniGameList();
        // render panel lain jika diperlukan
    }

    // ========== KATEGORI ==========
    function toggleCatInputs() {
        const el = document.getElementById('serverOptionsGroup');
        if (el) el.style.display = document.getElementById('catType').value === 'game' ? 'block' : 'none';
    }

    async function addCategory() {
        addDebugLog('Fungsi addCategory dipanggil');
        const keyEl = document.getElementById('catKey');
        const nameEl = document.getElementById('catName');
        const typeEl = document.getElementById('catType');
        const unitEl = document.getElementById('catUnit');
        const iconEl = document.getElementById('catIcon');
        const serversEl = document.getElementById('catServers');
        const coverEl = document.getElementById('coverUrl');

        if (!keyEl || !nameEl || !unitEl) {
            showAlert('Elemen form tidak ditemukan!');
            return;
        }

        const key = keyEl.value.trim().toLowerCase().replace(/\s/g,'');
        const name = nameEl.value.trim();
        const type = typeEl.value;
        const unit = unitEl.value.trim();
        const icon = iconEl.value.trim() || '📦';
        const servers = serversEl ? serversEl.value.trim() : '';
        const coverUrl = coverEl ? coverEl.value.trim() : '';

        addDebugLog(`Data: key=${key}, name=${name}, type=${type}, unit=${unit}`);

        if (!key || !name || !unit) {
            showAlert('Key, Nama, Unit wajib diisi');
            return;
        }
        if (configData.categories[key]) {
            showAlert('Key sudah ada');
            return;
        }

        try {
            configData.categories[key] = {
                name, type, icon, unit,
                serverOptions: type === 'game' ? servers.split(',').map(s => ({value:s.trim(),text:s.trim()})) : [],
                packages: [],
                gameUrl: '',
                coverUrl
            };
            await saveConfig();
            renderGameVoucherList();
            toast('✅ Game/Voucher ditambahkan');
            // Reset form
            keyEl.value = '';
            nameEl.value = '';
            unitEl.value = '';
            if (serversEl) serversEl.value = '';
            if (coverEl) coverEl.value = '';
            const preview = document.getElementById('coverPreview');
            if (preview) preview.innerHTML = '';
        } catch(e) {
            addDebugLog('Error addCategory: ' + e.message, true);
            showAlert('Gagal menambahkan: ' + e.message);
            toast('Gagal menambahkan', 'err');
        }
    }

    function renderGameVoucherList() {
        const container = document.getElementById('gameVoucherList');
        if (!container) return;
        const cats = Object.entries(configData.categories || {}).filter(([k,c]) => c.type !== 'minigame');
        if (!cats.length) {
            container.innerHTML = '<div style="color:#aaa;padding:10px;">Belum ada game/voucher.</div>';
            return;
        }
        let html = '';
        for (const [key, cat] of cats) {
            const cover = cat.coverUrl ? `<img src="${cat.coverUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;margin-right:8px;">` : '';
            html += `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;">${cover}${cat.icon} ${cat.name} (${cat.unit})</div>
                <button class="btn-sm danger" onclick="deleteCategory('${key}')">🗑️</button>
            </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteCategory(key) {
        if (!confirm('Hapus?')) return;
        delete configData.categories[key];
        await saveConfig();
        renderGameVoucherList();
        renderMiniGameList();
        toast('✅ Dihapus');
    }

    // ========== MINI GAME ==========
    async function addMiniGame() {
        const keyEl = document.getElementById('miniKey');
        const nameEl = document.getElementById('miniName');
        const iconEl = document.getElementById('miniIcon');
        const fileEl = document.getElementById('miniFile');
        const coverEl = document.getElementById('miniCoverUrl');

        if (!keyEl || !nameEl || !fileEl) {
            showAlert('Elemen form mini game tidak ditemukan');
            return;
        }

        const key = keyEl.value.trim().toLowerCase().replace(/\s/g,'');
        const name = nameEl.value.trim();
        const icon = iconEl.value.trim() || '🕹️';
        const coverUrl = coverEl ? coverEl.value.trim() : '';
        const file = fileEl.files[0];

        if (!key || !name) { showAlert('Key dan Nama wajib'); return; }
        if (!file) { showAlert('Pilih file HTML'); return; }

        try {
            const ref = storage.ref('minigames/' + key + '.html');
            await ref.put(file);
            const gameUrl = await ref.getDownloadURL();

            configData.categories[key] = {
                name, type:'minigame', icon, unit:'',
                serverOptions:[], packages:[],
                gameUrl, coverUrl
            };
            await saveConfig();
            renderMiniGameList();
            toast('✅ Mini Game ditambahkan');
            keyEl.value = '';
            nameEl.value = '';
            if (coverEl) coverEl.value = '';
            fileEl.value = '';
            const preview = document.getElementById('miniCoverPreview');
            if (preview) preview.innerHTML = '';
        } catch(e) { showAlert('Gagal upload: '+e.message); }
    }

    function renderMiniGameList() {
        const container = document.getElementById('miniGameList');
        if (!container) return;
        const minigames = Object.entries(configData.categories || {}).filter(([k,c]) => c.type === 'minigame');
        if (!minigames.length) {
            container.innerHTML = '<div style="color:#aaa;padding:10px;">Belum ada mini game.</div>';
            return;
        }
        let html = '';
        for (const [key, cat] of minigames) {
            const cover = cat.coverUrl ? `<img src="${cat.coverUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;margin-right:8px;">` : '';
            html += `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;">${cover}${cat.icon} ${cat.name}</div>
                <button class="btn-sm danger" onclick="deleteMiniGame('${key}')">🗑️</button>
            </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteMiniGame(key) {
        if (!confirm('Hapus?')) return;
        delete configData.categories[key];
        await saveConfig();
        renderMiniGameList();
    }

    // ========== SEARCH COVER ==========
    const GOOGLE_API_KEY = 'AIzaSyC9vrCuvdmuBZjBXJAI2rMF_CCi1nTT3Ks';
    const SEARCH_ENGINE_ID = '877f61e9779264adc';

    async function searchCover() {
        const query = document.getElementById('catName').value.trim();
        if (!query) { showAlert('Isi nama dulu'); return; }
        try {
            const url = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${SEARCH_ENGINE_ID}&searchType=image&q=${encodeURIComponent(query)}+cover&num=3`;
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById('coverPreview');
            if (!container) return;
            container.innerHTML = '';
            if (data.items) {
                data.items.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.link;
                    img.onclick = () => {
                        const coverEl = document.getElementById('coverUrl');
                        if (coverEl) coverEl.value = item.link;
                        container.querySelectorAll('img').forEach(i => i.classList.remove('selected-cover'));
                        img.classList.add('selected-cover');
                    };
                    container.appendChild(img);
                });
            } else container.innerHTML = '<span style="color:#aaa;">Tidak ditemukan.</span>';
        } catch(e) { showAlert('Gagal cari gambar'); }
    }

    async function searchMiniCover() {
        const query = document.getElementById('miniName').value.trim();
        if (!query) { showAlert('Isi nama dulu'); return; }
        try {
            const url = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${SEARCH_ENGINE_ID}&searchType=image&q=${encodeURIComponent(query)}+game&num=3`;
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById('miniCoverPreview');
            if (!container) return;
            container.innerHTML = '';
            if (data.items) {
                data.items.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.link;
                    img.onclick = () => {
                        const coverEl = document.getElementById('miniCoverUrl');
                        if (coverEl) coverEl.value = item.link;
                        container.querySelectorAll('img').forEach(i => i.classList.remove('selected-cover'));
                        img.classList.add('selected-cover');
                    };
                    container.appendChild(img);
                });
            } else container.innerHTML = '<span style="color:#aaa;">Tidak ditemukan.</span>';
        } catch(e) { showAlert('Gagal cari gambar'); }
    }

    // ========== EVENT LISTENER UNTUK TOMBOL (PENTING!) ==========
    document.addEventListener('DOMContentLoaded', function() {
        addDebugLog('DOM siap, binding tombol...');
        const btnCat = document.getElementById('btnAddCategory');
        const btnMini = document.getElementById('btnAddMiniGame');
        
        if (btnCat) {
            btnCat.addEventListener('click', function(e) {
                e.preventDefault();
                addDebugLog('Tombol Tambah Game diklik (event listener)');
                addCategory();
            });
            addDebugLog('Tombol Game/Voucher terpasang.');
        } else {
            addDebugLog('Tombol Game/Voucher TIDAK DITEMUKAN!', true);
        }

        if (btnMini) {
            btnMini.addEventListener('click', function(e) {
                e.preventDefault();
                addDebugLog('Tombol Mini Game diklik (event listener)');
                addMiniGame();
            });
            addDebugLog('Tombol Mini Game terpasang.');
        } else {
            addDebugLog('Tombol Mini Game TIDAK DITEMUKAN!', true);
        }
    });

    // Tab navigation
    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const panelId = 'panel-' + this.dataset.tab;
            const panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cek Status</title><style>body{background:#0a0a0a;color:#fff;text-align:center;padding:50px;font-family:sans-serif;}input{padding:10px;border-radius:8px;border:none;width:250px;}button{padding:10px 20px;background:#ff6b6b;color:#fff;border:none;border-radius:8px;cursor:pointer;}</style></head><body>
<h1>Cek Status Pesanan</h1>
<input type="text" id="orderIdInput" placeholder="Masukkan Order ID"><br><br>
<button onclick="cekStatus()">Cek</button>
<div id="result" style="margin-top:20px;"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
    firebase.initializeApp({/* config sama */});
    const db=firebase.firestore();
    async function cekStatus(){
        const id=document.getElementById('orderIdInput').value.trim();
        const snap=await db.collection('orders').where('orderId','==',id).get();
        if(snap.empty)return document.getElementById('result').innerHTML='❌ Tidak ditemukan';
        const o=snap.docs[0].data();
        document.getElementById('result').innerHTML=`Status: <b>${o.status}</b><br>Game: ${o.game||o.category}<br>Jumlah: ${o.amount} ${o.unit}<br>Total: Rp ${o.price?.toLocaleString('id-ID')}`;
    }
</script>
</body></html>

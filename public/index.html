<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YaddStore - Top Up & Mini Games</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0a0a; --card:rgba(255,255,255,0.05); --accent:#ff6b6b; --gold:#ffd93d; --border:rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:linear-gradient(135deg,#0a0a0a,#1a1a2e,#16213e); min-height:100vh; padding:15px; }
        .container { max-width:450px; margin:0 auto; }
        .header { text-align:center; padding:20px 0; margin-bottom:20px; }
        .logo { font-size:2.2em; font-weight:800; background:linear-gradient(45deg,#ff6b6b,#ffd93d,#ff6b6b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .subtitle { color:#aaa; font-size:0.85em; letter-spacing:2px; margin-top:5px; }
        .badge { display:inline-block; background:#2ed573; color:#000; padding:4px 12px; border-radius:20px; font-size:0.7em; font-weight:700; margin-top:8px; }
        .card { background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:20px; }
        .input-group { margin-bottom:15px; }
        .input-group label { display:block; color:#ccc; font-size:0.8em; font-weight:600; margin-bottom:6px; }
        .input-group input, .input-group select { width:100%; padding:12px 15px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; font-size:0.95em; outline:none; }
        .category-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .cat-card { background:rgba(255,255,255,0.06); border-radius:12px; padding:10px; text-align:center; cursor:pointer; border:2px solid transparent; transition:0.3s; position:relative; }
        .cat-card:hover { border-color:var(--accent); }
        .cat-card.selected { border-color:var(--accent); background:rgba(255,107,107,0.1); }
        .cat-cover { width:100%; height:80px; object-fit:cover; border-radius:8px; margin-bottom:8px; background:rgba(255,255,255,0.05); display:block; }
        .cat-icon { font-size:2em; display:block; }
        .cat-name { font-size:0.8em; color:#ccc; margin-top:4px; }
        .packages { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px; }
        .pkg { background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; transition:0.3s; color:#fff; position:relative; }
        .pkg:hover { background:rgba(255,107,107,0.1); border-color:rgba(255,107,107,0.4); }
        .pkg.selected { background:rgba(255,107,107,0.15); border-color:var(--accent); }
        .pkg .best { position:absolute; top:6px; right:6px; background:#ff6b6b; color:#fff; font-size:0.6em; padding:2px 7px; border-radius:8px; font-weight:700; }
        .pkg .amount { font-size:1.2em; font-weight:700; }
        .pkg .unit { font-size:0.75em; color:#aaa; }
        .pkg .price { font-size:0.9em; font-weight:700; color:var(--gold); margin-top:5px; }
        .btn { width:100%; padding:14px; border:none; border-radius:10px; color:#fff; font-size:1em; font-weight:700; cursor:pointer; margin-top:8px; }
        .btn-red { background:linear-gradient(45deg,#ff6b6b,#ee5a24); }
        .btn-red:disabled { background:#555; cursor:not-allowed; }
        .btn-gray { background:rgba(255,255,255,0.1); }
        .btn-row { display:flex; gap:8px; } .btn-row .btn { flex:1; }
        .upload-box { border:2px dashed rgba(255,255,255,0.2); border-radius:12px; padding:20px; text-align:center; cursor:pointer; margin:15px 0; }
        .upload-box.done { border-color:#2ed573; }
        .toast { position:fixed; top:20px; right:20px; background:#2ed573; color:#fff; padding:12px 20px; border-radius:10px; display:none; z-index:9999; }
        .toast.err { background:#ff6b6b; }
        .minigame-container { margin-top:20px; }
        iframe { width:100%; height:400px; border:none; border-radius:12px; }
        #minigameCover { width:100%; max-height:200px; object-fit:cover; border-radius:12px; margin-bottom:15px; }
        .whatsapp-float { position:fixed; bottom:20px; right:20px; background:#25D366; color:#fff; width:50px; height:50px; border-radius:50%; text-align:center; line-height:50px; font-size:24px; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:999; text-decoration:none; }
        .banner-slider { display:flex; overflow-x:auto; margin-bottom:15px; gap:10px; scroll-snap-type:x mandatory; }
        .banner-slider img { scroll-snap-align:start; width:100%; max-height:150px; object-fit:cover; border-radius:12px; }
        .lang-switch { text-align:right; margin-bottom:10px; }
        .lang-switch button { background:none; border:1px solid #fff; color:#fff; padding:4px 10px; border-radius:6px; cursor:pointer; }
        .empty-message { color:#aaa; text-align:center; padding:20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">YaddStore</div>
        <div class="subtitle" id="subtitleText">✦ TOP UP & MINI GAMES ✦</div>
        <div class="badge">🟢 Online</div>
    </div>
    <div class="lang-switch">
        <button onclick="switchLang('id')">ID</button> | <button onclick="switchLang('en')">EN</button>
    </div>

    <div class="card">
        <!-- Banner -->
        <div class="banner-slider" id="bannerSlider"></div>

        <!-- Step 1 -->
        <div id="step1">
            <label style="color:#ccc;font-weight:600;margin-bottom:10px;display:block;" id="chooseCatLabel">📦 Pilih Kategori</label>
            <div class="category-cards" id="categoryCards">
                <div class="empty-message">Memuat kategori...</div>
            </div>
            <div class="input-group" id="serverGroup" style="display:none;">
                <label>🌐 Server</label><select id="serverSelect"></select>
            </div>
            <div class="input-group">
                <label id="idLabel">📱 ID / Nomor</label><input type="text" id="userId">
            </div>
            <div class="input-group">
                <label id="emailLabel">📧 Email</label><input type="email" id="email">
            </div>
            <button class="btn btn-red" id="btnNext" disabled onclick="goToStep2()">LANJUT ➜</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" style="display:none;">
            <div id="packageSection" style="display:none;"><div class="packages" id="pkgList"></div></div>
            <div id="minigameSection" style="display:none;">
                <h3 id="minigameName" style="color:#fff;text-align:center;"></h3>
                <img id="minigameCover" src="" style="display:none;">
                <div class="minigame-container"><iframe id="minigameFrame" src=""></iframe></div>
                <button class="btn btn-red" onclick="submitMinigameOrder()">✅ MULAI MAIN</button>
            </div>
            <div class="btn-row" id="step2Nav">
                <button class="btn btn-gray" onclick="backToStep1()">⬅ KEMBALI</button>
                <button class="btn btn-red" id="btnGoPay" onclick="goToStep3()" disabled>LANJUT ➜</button>
            </div>
        </div>

        <!-- Step 3 -->
        <div id="step3" style="display:none;">
            <div id="payList" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
            <div id="payDetail" style="display:none;background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25);border-radius:12px;padding:15px;">
                <h4 style="color:#ffd93d;">💳 Detail Pembayaran</h4>
                <div>Metode: <strong id="dispMethod">-</strong></div>
                <div>Nomor: <strong id="dispNumber">-</strong></div>
                <div>Total: <strong id="dispAmount">Rp 0</strong></div>
                <button class="btn btn-gray" onclick="copyNumber()">📋 SALIN NOMOR</button>
            </div>
            <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                <div>📸</div><div id="uploadText">Upload bukti pembayaran</div>
            </div>
            <input type="file" id="fileInput" accept="image/*,.pdf" onchange="handleFile(event)" style="display:none;">
            <button class="btn btn-red" id="btnSubmit" onclick="submitOrder()" disabled>KIRIM PESANAN</button>
        </div>
    </div>
</div>

<a href="https://wa.me/6283170617054" target="_blank" class="whatsapp-float">💬</a>
<div class="toast" id="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMwguFp5Az8Q4KPVkq6etrhrEY_fHrlgo",
        authDomain: "yaddstore.firebaseapp.com",
        projectId: "yaddstore",
        storageBucket: "yaddstore.firebasestorage.app",
        messagingSenderId: "1086200506513",
        appId: "1:1086200506513:web:9ee304eb4d8fe78d88f730"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let categories = {};
    let payments = [];
    let banners = [];
    let selectedCategory = null;
    let selPackage = null;
    let selPayment = null;
    let selFile = null;
    let lang = 'id';

    const langData = {
        id:{ subtitle:'✦ TOP UP & MINI GAMES ✦', chooseCat:'📦 Pilih Kategori', idLabel:'📱 ID / Nomor', emailLabel:'📧 Email', next:'LANJUT ➜', back:'⬅ KEMBALI', goPay:'LANJUT ➜', upload:'Upload bukti pembayaran', submit:'KIRIM PESANAN', play:'✅ MULAI MAIN' },
        en:{ subtitle:'✦ TOP UP & MINI GAMES ✦', chooseCat:'📦 Choose Category', idLabel:'📱 ID / Number', emailLabel:'📧 Email', next:'NEXT ➜', back:'⬅ BACK', goPay:'NEXT ➜', upload:'Upload payment proof', submit:'SUBMIT ORDER', play:'✅ PLAY NOW' }
    };

    function switchLang(l) {
        lang = l;
        const t = langData[l];
        document.getElementById('subtitleText').textContent = t.subtitle;
        document.getElementById('chooseCatLabel').textContent = t.chooseCat;
        document.getElementById('idLabel').textContent = t.idLabel;
        document.getElementById('emailLabel').textContent = t.emailLabel;
        document.getElementById('btnNext').textContent = t.next;
        document.getElementById('btnGoPay').textContent = t.goPay;
        document.getElementById('uploadText').textContent = t.upload;
        document.getElementById('btnSubmit').textContent = t.submit;
    }

    async function loadData() {
        try {
            const doc = await db.collection('config').doc('settings').get();
            if (doc.exists) {
                const data = doc.data();
                categories = data.categories || {};
                payments = data.payments || [];
                banners = data.banners || [];
            }
        } catch(e) { console.error('Gagal memuat data:', e); }
        renderCategoryCards();
        renderBanners();
    }

    function renderBanners() {
        const slider = document.getElementById('bannerSlider');
        if (!banners.length) { slider.style.display = 'none'; return; }
        slider.style.display = 'flex';
        slider.innerHTML = banners.map(b => `<img src="${b.url}" alt="Banner">`).join('');
    }

    function renderCategoryCards() {
        const container = document.getElementById('categoryCards');
        const cats = categories;
        const keys = Object.keys(cats);
        if (!keys.length) { container.innerHTML = '<div class="empty-message">Belum ada kategori. Silakan cek lagi nanti.</div>'; return; }
        container.innerHTML = '';
        for (const [key, cat] of Object.entries(cats)) {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.dataset.key = key;
            if (cat.coverUrl) {
                card.innerHTML = `<img src="${cat.coverUrl}" class="cat-cover" onerror="this.style.display='none'"><span class="cat-icon" style="display:none;">${cat.icon || '📦'}</span><div class="cat-name">${cat.name}</div>`;
            } else {
                card.innerHTML = `<span class="cat-icon">${cat.icon || '📦'}</span><div class="cat-name">${cat.name}</div>`;
            }
            card.addEventListener('click', () => selectCategory(key, card));
            container.appendChild(card);
        }
    }

    function selectCategory(key, card) {
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedCategory = categories[key];
        document.getElementById('btnNext').disabled = false;
        const serverGroup = document.getElementById('serverGroup');
        if (selectedCategory.type === 'game' && selectedCategory.serverOptions) {
            serverGroup.style.display = 'block';
            const sel = document.getElementById('serverSelect');
            sel.innerHTML = selectedCategory.serverOptions.map(opt => `<option value="${opt.value}">${opt.text}</option>`).join('');
        } else {
            serverGroup.style.display = 'none';
        }
    }

    function goToStep2() {
        if (!document.getElementById('userId').value.trim() || !document.getElementById('email').value.trim()) {
            return toast('Isi ID dan Email', 'err');
        }
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        if (selectedCategory.type === 'minigame') {
            document.getElementById('packageSection').style.display = 'none';
            document.getElementById('minigameSection').style.display = 'block';
            document.getElementById('minigameName').textContent = selectedCategory.name;
            const cover = document.getElementById('minigameCover');
            if (selectedCategory.coverUrl) {
                cover.src = selectedCategory.coverUrl;
                cover.style.display = 'block';
            } else cover.style.display = 'none';
            document.getElementById('minigameFrame').src = selectedCategory.gameUrl || '';
            document.getElementById('step2Nav').style.display = 'none';
        } else {
            document.getElementById('packageSection').style.display = 'block';
            document.getElementById('minigameSection').style.display = 'none';
            document.getElementById('step2Nav').style.display = 'flex';
            renderPackages();
        }
    }

    function backToStep1() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
    }

    function renderPackages() {
        const container = document.getElementById('pkgList');
        if (!selectedCategory || !selectedCategory.packages || !selectedCategory.packages.length) {
            container.innerHTML = '<div class="empty-message">Belum ada paket tersedia.</div>';
            return;
        }
        container.innerHTML = selectedCategory.packages.map(p => `
            <div class="pkg" data-amount="${p.amount}" data-price="${p.price}">
                ${p.best ? '<div class="best">BEST</div>' : ''}
                <div class="amount">${p.amount}</div>
                <div class="unit">${selectedCategory.unit || ''}</div>
                <div class="price">Rp ${p.price.toLocaleString('id-ID')}</div>
            </div>
        `).join('');
        document.querySelectorAll('.pkg').forEach(p => {
            p.addEventListener('click', function() {
                document.querySelectorAll('.pkg').forEach(pp => pp.classList.remove('selected'));
                this.classList.add('selected');
                selPackage = {
                    amount: this.dataset.amount,
                    price: parseInt(this.dataset.price),
                    unit: selectedCategory.unit
                };
                document.getElementById('btnGoPay').disabled = false;
            });
        });
    }

    function goToStep3() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        renderPayments();
    }

    function renderPayments() {
        const container = document.getElementById('payList');
        if (!payments.length) {
            container.innerHTML = '<div class="empty-message">Belum ada metode pembayaran.</div>';
            return;
        }
        container.innerHTML = payments.map(p => `
            <div style="background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;text-align:center;cursor:pointer;" onclick="selectPayment('${p.method}','${p.number}',this)">
                ${p.icon} ${p.method}
            </div>
        `).join('');
    }

    function selectPayment(method, number, el) {
        document.querySelectorAll('#payList div').forEach(d => d.style.borderColor = 'rgba(255,255,255,0.1)');
        el.style.borderColor = '#ff6b6b';
        selPayment = { method, number };
        document.getElementById('payDetail').style.display = 'block';
        document.getElementById('dispMethod').textContent = method;
        document.getElementById('dispNumber').textContent = number;
        if (selPackage) {
            document.getElementById('dispAmount').textContent = 'Rp ' + selPackage.price.toLocaleString('id-ID');
        }
    }

    function copyNumber() {
        if (selPayment) navigator.clipboard.writeText(selPayment.number).then(() => toast('✅ Disalin'));
    }

    function handleFile(event) {
        const f = event.target.files[0];
        if (f && f.size <= 5*1024*1024) {
            selFile = f;
            document.getElementById('uploadBox').classList.add('done');
            document.getElementById('uploadText').textContent = '✅ ' + f.name;
            document.getElementById('btnSubmit').disabled = false;
        } else {
            toast('File terlalu besar (max 5MB)', 'err');
        }
    }

    async function submitOrder() {
        if (!selPackage || !selPayment || !selFile) return;
        const orderData = {
            orderId: 'YADD-'+Date.now().toString(36).toUpperCase(),
            category: selectedCategory.name,
            categoryKey: Object.keys(categories).find(k => categories[k] === selectedCategory),
            userId: document.getElementById('userId').value.trim(),
            server: document.getElementById('serverSelect')?.value || '',
            email: document.getElementById('email').value.trim(),
            amount: selPackage.amount,
            price: selPackage.price,
            unit: selectedCategory.unit,
            paymentMethod: selPayment.method,
            paymentNumber: selPayment.number,
            status: 'pending',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            await db.collection('orders').add(orderData);
            toast('✅ Pesanan dikirim!');
            resetForm();
        } catch(e) { toast('❌ Gagal', 'err'); }
    }

    async function submitMinigameOrder() {
        await db.collection('orders').add({
            orderId: 'YADD-'+Date.now().toString(36).toUpperCase(),
            category: selectedCategory.name,
            userId: document.getElementById('userId').value.trim(),
            email: document.getElementById('email').value.trim(),
            type: 'minigame',
            status: 'done',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('✅ Selamat bermain!');
        resetForm();
    }

    function resetForm() {
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('userId').value = '';
        document.getElementById('email').value = '';
        document.getElementById('fileInput').value = '';
        selPackage = null; selPayment = null; selFile = null;
        document.getElementById('btnNext').disabled = true;
        document.getElementById('btnGoPay').disabled = true;
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('uploadBox').classList.remove('done');
        document.getElementById('uploadText').textContent = langData[lang].upload;
        selectedCategory = null;
    }

    function toast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (type === 'err' ? ' err' : '');
        t.style.display = 'block';
        clearTimeout(t._timeout);
        t._timeout = setTimeout(() => t.style.display = 'none', 3000);
    }

    loadData();
</script>
</body>
</html>

name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Menulis service account JSON ke file
      - name: Write Firebase Service Account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > $HOME/firebase-key.json

      # Deploy Firestore Rules
      - name: Deploy Firestore Rules
        run: npx firebase-tools deploy --only firestore:rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-key.json

      # Deploy Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: yaddstore
